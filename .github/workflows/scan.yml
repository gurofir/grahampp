name: discovery-scan

# Nightly Discovery Engine scan: scans the S&P 500 universe, runs Graham +
# Market engines on filtered candidates, and writes the resulting situations
# to Supabase. The frontend then reads them via /.netlify/functions/discover.
#
# Why GitHub Actions instead of Netlify scheduled functions:
#   - Netlify scheduled (background) functions require a Pro plan.
#   - GitHub Actions is free for public repos and has generous quotas for
#     private repos. A full scan takes ~10-20 min, well under the 6h limit.

on:
  schedule:
    # 03:00 UTC every day (= 06:00 Israel winter / 06:00 Israel summer adjusted).
    # Cron timezone is always UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allows manual "Run workflow" from the Actions tab.

concurrency:
  # Never run two scans at once.
  group: discovery-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SCAN_LANG: he
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22+ is required by @supabase/realtime-js (native WebSocket)
          # and recommended by yahoo-finance2.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run discovery scan
        run: node scripts/run-scan.cjs
