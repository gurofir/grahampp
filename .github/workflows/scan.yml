name: discovery-scan

# Nightly Discovery Engine scan: processes the watchlist (top scorers from the
# previous scan + tickers analyzed in the last 7 days), runs Graham + Market
# engines on the filtered candidates, and writes the resulting situations to
# Supabase. The frontend then reads them via /.netlify/functions/discover.
#
# A weekly full-universe sweep (.github/workflows/scan-full.yml) rotates the
# watchlist composition by re-evaluating the entire SCAN_UNIVERSE.
#
# Why GitHub Actions instead of Netlify scheduled functions:
#   - Netlify scheduled (background) functions require a Pro plan.
#   - GitHub Actions is free for public repos and has generous quotas for
#     private repos. A nightly watchlist scan takes ~3-6 min.

on:
  schedule:
    # 03:00 UTC every day (= 06:00 Israel winter / 05:00 Israel summer).
    # Cron timezone is always UTC.
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allows manual "Run workflow" from the Actions tab.
    inputs:
      mode:
        description: 'Scan mode'
        required: false
        default: 'nightly'
        type: choice
        options:
          - nightly
          - full

concurrency:
  # Never run two scans at once -- nightly and full share the same group.
  group: discovery-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Stored content is produced in English. Hebrew UI users see HE labels
      # around English thesis/insight text.
      SCAN_LANG: en
      # Default to nightly (watchlist) when triggered by cron; honour the
      # workflow_dispatch input when triggered manually.
      SCAN_MODE: ${{ inputs.mode || 'nightly' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22+ is required by @supabase/realtime-js (native WebSocket)
          # and recommended by yahoo-finance2.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run discovery scan
        run: node scripts/run-scan.cjs
